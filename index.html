<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>风歌 WIND-SING</title>

  <!-- Bootstrap 5 CSS（暗黑模式） -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <!-- DPlayer CSS -->
  <link href="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.css" rel="stylesheet">

  <style>
    :root {
      --bg-dark: #121212;
      --text-soft: #ccc;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-soft);
      /* 为固定导航栏预留顶部间距 */
      padding-top: 70px;
    }

    /* 导航栏品牌样式 */
    .navbar-brand {
      font-weight: 700;
      letter-spacing: 1px;
    }

    /* 导航链接默认样式 */
    .nav-link {
      cursor: pointer;
      transition: color 0.2s, background-color 0.2s;
    }

    /* 当前激活的导航项高亮 */
    .nav-link.active {
      color: #fff !important;
      font-weight: 600;
    }

    /* 内容模块卡片 */
    .content-card {
      background-color: #1e1e1e;
      border-radius: 8px;
      padding: 2rem;
      margin-bottom: 1.5rem;
    }

    .content-card h2 {
      color: #fff;
      margin-bottom: 1rem;
    }

    .content-card p {
      color: #aaa;
      line-height: 1.8;
    }

    /* ---------- 发布器 ---------- */
    .publisher-box {
      background-color: #1e1e1e;
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .publisher-box textarea {
      background-color: #2a2a2a;
      border: 1px solid #444;
      color: #ddd;
      resize: none;
    }
    .publisher-box textarea:focus {
      background-color: #2a2a2a;
      border-color: #0d6efd;
      color: #fff;
      box-shadow: none;
    }
    .publisher-box textarea::placeholder {
      color: #777;
    }

    /* ---------- 动态卡片 ---------- */
    .feed-card {
      background-color: #1e1e1e;
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1.25rem;
    }
    .feed-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .feed-nickname {
      font-weight: 600;
      color: #e0e0e0;
    }
    .feed-time {
      font-size: 0.8rem;
      color: #777;
    }
    .feed-body {
      color: #bbb;
      line-height: 1.7;
      margin-top: 0.75rem;
    }
    .feed-images img {
      border-radius: 6px;
      width: 100%;
      height: 120px;
      object-fit: cover;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .feed-images img:hover {
      opacity: 0.85;
    }
    .feed-actions .btn {
      color: #888;
      font-size: 0.9rem;
      padding: 0.25rem 0.5rem;
    }
    .feed-actions .btn:hover {
      color: #fff;
    }
    /* 时间线空状态 */
    .timeline-empty {
      text-align: center;
      color: #666;
      padding: 3rem 1rem;
      font-size: 0.95rem;
    }
    /* 登录按钮状态 */
    #btn-login.logged-in {
      color: #0d6efd;
      border-color: #0d6efd;
    }

    /* ---------- 追剧 - 视频播放器 ---------- */
    .video-player-wrapper {
      background-color: #000;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.6);
    }
    /* DPlayer 容器保持 16:9 */
    #dplayer-container {
      aspect-ratio: 16 / 9;
    }
    /* 选集面板 */
    .episode-panel {
      background-color: #1e1e1e;
      border-radius: 8px;
      padding: 1rem;
      height: fit-content;
    }
    .episode-panel .list-group-item {
      background-color: #1e1e1e;
      color: #bbb;
      border-color: #333;
      cursor: pointer;
      transition: background-color 0.2s, color 0.2s;
    }
    .episode-panel .list-group-item:hover {
      background-color: #2a2a2a;
      color: #fff;
    }
    .episode-panel .list-group-item.active {
      background-color: #0d6efd;
      border-color: #0d6efd;
      color: #fff;
    }

    /* ---------- 阅读 - 小说阅读器 ---------- */
    /* 章节目录 */
    .chapter-sidebar {
      background-color: #1e1e1e;
      border-radius: 8px;
      max-height: 75vh;
      overflow-y: auto;
    }
    .chapter-sidebar .list-group-item {
      background-color: transparent;
      color: #aaa;
      border-color: #2a2a2a;
      cursor: pointer;
      transition: background-color 0.2s, color 0.2s;
    }
    .chapter-sidebar .list-group-item:hover {
      background-color: #2a2a2a;
      color: #fff;
    }
    .chapter-sidebar .list-group-item.active {
      background-color: #0d6efd;
      border-color: #0d6efd;
      color: #fff;
    }
    /* 正文阅读区 */
    .reader-panel {
      background-color: #1e1e1e;
      border-radius: 8px;
      padding: 2rem 2.5rem;
      min-height: 75vh;
      position: relative;
    }
    .reader-content {
      color: #d4d4d4;
      font-size: 1rem; /* JS 会以此为基准调节 */
      line-height: 2;
      transition: font-size 0.2s;
    }
    .reader-content p {
      text-indent: 2em;
      margin-bottom: 1rem;
    }
    /* 悬浮工具栏 */
    .reader-toolbar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background-color: #2a2a2a;
      border-radius: 8px;
      padding: 0.5rem 0.75rem;
      position: sticky;
      top: 76px; /* 导航栏高度 + 间距 */
      z-index: 10;
      margin-bottom: 1.5rem;
    }
    .reader-toolbar .btn {
      color: #aaa;
      font-size: 0.85rem;
      padding: 0.25rem 0.6rem;
    }
    .reader-toolbar .btn:hover {
      color: #fff;
    }
    .reader-toolbar .font-size-label {
      color: #888;
      font-size: 0.85rem;
      min-width: 2.5rem;
      text-align: center;
    }
    .reader-chapter-title {
      color: #fff;
      margin-bottom: 1.5rem;
    }
    .reader-content code {
      background-color: #2a2a2a;
      color: #e8b96d;
      padding: 0.15em 0.4em;
      border-radius: 3px;
      font-size: 0.9em;
      font-family: 'Courier New', Consolas, monospace;
    }

    /* ---------- 听歌 - 私人电台 ---------- */
    /* 左侧播放器面板 */
    .player-panel {
      background-color: #1e1e1e;
      border-radius: 12px;
      padding: 2rem 1.5rem 1.5rem;
      text-align: center;
    }
    .player-cover {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 10px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.5);
      margin-bottom: 1.5rem;
    }
    .player-song {
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .player-artist {
      color: #888;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }
    .player-progress {
      height: 4px;
      margin-bottom: 1.25rem;
    }
    .player-progress .progress-bar {
      background-color: #0d6efd;
      transition: width 0.3s;
    }
    .player-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
    }
    .player-controls .btn-control {
      color: #bbb;
      font-size: 1.3rem;
      padding: 0.3rem;
      line-height: 1;
      transition: color 0.2s, transform 0.15s;
    }
    .player-controls .btn-control:hover {
      color: #fff;
      transform: scale(1.1);
    }
    .player-controls .btn-play {
      color: #fff;
      font-size: 2rem;
      background-color: #0d6efd;
      border-radius: 50%;
      width: 54px;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.2s, transform 0.15s;
    }
    .player-controls .btn-play:hover {
      background-color: #0b5ed7;
      transform: scale(1.08);
      color: #fff;
    }

    /* 右侧：歌词 + 歌单 */
    .lyric-box {
      background-color: #1e1e1e;
      border-radius: 8px;
      padding: 1.25rem;
      height: 260px;
      overflow-y: auto;
      margin-bottom: 1rem;
    }
    .lyric-line {
      color: #666;
      font-size: 0.9rem;
      padding: 0.35rem 0.5rem;
      border-radius: 4px;
      transition: color 0.3s, background-color 0.3s;
      line-height: 1.8;
    }
    .lyric-line.active {
      color: #0d6efd;
      background-color: rgba(13, 110, 253, 0.1);
      font-weight: 600;
    }
    .playlist-panel .list-group-item {
      background-color: #1e1e1e;
      color: #aaa;
      border-color: #2a2a2a;
      cursor: pointer;
      transition: background-color 0.2s, color 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .playlist-panel .list-group-item:hover {
      background-color: #2a2a2a;
      color: #fff;
    }
    .playlist-panel .list-group-item.active {
      background-color: #252525;
      border-left: 3px solid #0d6efd;
      color: #fff;
    }
    .playlist-panel .list-group-item .song-index {
      color: #666;
      font-size: 0.8rem;
      min-width: 1.2rem;
    }
    .playlist-panel .list-group-item .delete-song {
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .playlist-panel .list-group-item:hover .delete-song {
      opacity: 1;
    }
    /* 添加歌曲输入框 */
    #add-song-title, #add-song-artist {
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <!-- ========== 顶部固定导航栏 ========== -->
  <nav class="navbar navbar-expand-lg fixed-top bg-dark border-bottom border-secondary">
    <div class="container">
      <!-- 品牌 Logo -->
      <a class="navbar-brand" href="#">
        <i class="bi bi-wind me-2"></i>风歌 WIND-SING
      </a>

      <!-- 移动端汉堡菜单按钮 -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
              aria-controls="navbarNav" aria-expanded="false" aria-label="切换导航">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- 导航菜单项 -->
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link active" data-tab="feeds">
              <i class="bi bi-rss me-1"></i>动态
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-tab="drama">
              <i class="bi bi-tv me-1"></i>追剧
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-tab="music">
              <i class="bi bi-music-note-beamed me-1"></i>听歌
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-tab="reading">
              <i class="bi bi-book me-1"></i>阅读
            </a>
          </li>
        </ul>
        <!-- 登录按钮 -->
        <button id="btn-login" class="btn btn-outline-secondary btn-sm ms-3" title="登录">
          <i class="bi bi-person"></i>
        </button>
      </div>
    </div>
  </nav>

  <!-- ========== 主内容区 ========== -->
  <main class="container">

    <!-- 动态 -->
    <section id="tab-feeds">

      <!-- ===== 发布器 ===== -->
      <div class="publisher-box">
        <textarea id="publish-textarea" class="form-control mb-3" rows="3" placeholder="分享此刻的想法..."></textarea>
        <div class="d-flex justify-content-between align-items-center">
          <button class="btn btn-outline-secondary btn-sm" title="添加图片">
            <i class="bi bi-image me-1"></i>添加图片
          </button>
          <button id="publish-btn" class="btn btn-primary btn-sm px-4">发布动态</button>
        </div>
      </div>

      <!-- ===== 时间线（JS 动态渲染） ===== -->
      <div id="timeline-list"></div>

    </section>

    <!-- 追剧 -->
    <section id="tab-drama" class="d-none">
      <div class="row g-4">
        <!-- 左侧：视频播放器 -->
        <div class="col-lg-8">
          <div class="video-player-wrapper">
            <div id="dplayer-container"></div>
          </div>
        </div>
        <!-- 右侧：追剧列表 -->
        <div class="col-lg-4">
          <div class="episode-panel">
            <h5 class="text-white mb-3"><i class="bi bi-collection-play me-2"></i>追剧列表</h5>
            <div class="list-group" id="episode-list">
              <!-- JS 动态渲染 -->
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- 听歌 -->
    <section id="tab-music" class="d-none">
      <div class="row g-4">
        <!-- 左侧：播放器面板 -->
        <div class="col-lg-4">
          <div class="player-panel">
            <!-- 专辑封面 -->
            <img id="player-cover" class="player-cover"
                 src="https://picsum.photos/seed/music1/400/400"
                 alt="专辑封面">
            <!-- 歌曲信息 -->
            <div class="player-song" id="player-song">晴天</div>
            <div class="player-artist" id="player-artist">周杰伦</div>
            <!-- 进度条 -->
            <div class="progress player-progress" id="player-progress-bar">
              <div class="progress-bar" role="progressbar" style="width: 0%"></div>
            </div>
            <!-- 控制按钮 -->
            <div class="player-controls">
              <button class="btn btn-control" id="btn-prev" title="上一首">
                <i class="bi bi-skip-start-fill"></i>
              </button>
              <button class="btn btn-control btn-play" id="btn-play" title="播放">
                <i class="bi bi-play-fill"></i>
              </button>
              <button class="btn btn-control" id="btn-next" title="下一首">
                <i class="bi bi-skip-end-fill"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- 右侧：歌词 + 歌单 -->
        <div class="col-lg-8">
          <!-- 歌词滚动区 -->
          <div class="lyric-box" id="lyric-box">
            <div class="text-center text-muted py-5">
              <i class="bi bi-music-note" style="font-size:2rem;"></i>
              <p class="mt-2 small">选择一首歌曲开始播放</p>
            </div>
          </div>
          <!-- 歌单列表 -->
          <div class="playlist-panel">
            <h6 class="text-white mb-2 px-2"><i class="bi bi-music-note-list me-2"></i>私人歌单</h6>
            <!-- 添加歌曲 -->
            <div class="input-group input-group-sm mb-2 px-2">
              <input type="text" class="form-control bg-dark text-white border-secondary" id="add-song-title" placeholder="歌曲名">
              <input type="text" class="form-control bg-dark text-white border-secondary" id="add-song-artist" placeholder="歌手">
              <button class="btn btn-outline-primary" id="btn-add-song" title="添加"><i class="bi bi-plus-lg"></i></button>
            </div>
            <!-- 歌单列表（JS 动态渲染） -->
            <div class="list-group" id="playlist" style="max-height:300px;overflow-y:auto;">
              <div class="text-center text-muted py-3 small">请先登录以加载歌单</div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- 阅读 -->
    <section id="tab-reading" class="d-none">
      <div class="row g-4">
        <!-- 左侧：书架 + 章节目录 (3/12) -->
        <div class="col-lg-3">
          <div class="chapter-sidebar p-3">
            <h5 class="text-white mb-3"><i class="bi bi-bookmark me-2"></i>书架</h5>
            <!-- 书籍选择 -->
            <div class="list-group mb-3" id="book-list" style="font-size:0.85rem;">
              <!-- JS 动态渲染 -->
            </div>
            <!-- 章节目录 -->
            <div class="list-group" id="chapter-list" style="max-height:45vh;overflow-y:auto;">
              <!-- JS 动态渲染 -->
            </div>
          </div>
        </div>

        <!-- 右侧：正文阅读区 (9/12) -->

          <div class="reader-panel">

              <span class="font-size-label" id="font-size-label">16px</span>

                <i class="bi bi-chevron-left"></i> 上一章

              <button class="btn btn-sm" id="next-chapter" title="下一章">

              </button>

            <!-- 正文内容 -->
            <h3 class="reader-chapter-title" id="chapter-title">第一章 西关大屋的趟栊门</h3>
            <div class="reader-content" id="reader-content">
              <p>选择一本书开始阅读</p>
            </div>

          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- ========== 登录模态框 ========== -->

      <div class="modal-content bg-dark text-white border-secondary">

          <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">取消</button>
          <button type="button" class="btn btn-primary btn-sm" id="btn-login-submit">登录</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap 5 JS（导航栏折叠等功能依赖） -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- hls.js（m3u8 流媒体解析） -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <!-- DPlayer -->
  <script src="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.js"></script>

  <!-- ========== 追剧 - 视频播放器 + 进度云同步 ========== -->
  <script>
    (function () {
      const API_BASE = 'http://localhost:8080';
      const container = document.getElementById('dplayer-container');
      const episodeListEl = document.getElementById('episode-list');

      // 测试用 m3u8 视频源（3个开源测试流）
      const videoSources = [
        {
          title: 'Big Buck Bunny',
          url: 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8',
          epIndex: 1,
          epTitle: '第 1 集 - Big Buck Bunny'
        },
        {
          title: 'Tears of Steel',
          url: 'https://test-streams.mux.dev/pts_t/multiple_original_renditions/master.m3u8',
          epIndex: 2,
          epTitle: '第 2 集 - Tears of Steel'
        },
        {
          title: 'Sintel Trailer',
          url: 'https://test-streams.mux.dev/sintel/sintel.m3u8',
          epIndex: 3,
          epTitle: '第 3 集 - Sintel'
        }
      ];

      let dp = null;
      let currentSourceIndex = 0;
      let currentBookmark = null;   // 当前视频的后端追剧记录
      let lastSaveTime = 0;        // 上次保存进度的时间戳（节流用）
      let playerInited = false;

      // ---- 选集列表渲染 ----
      function renderEpisodeList(bookmarks) {
        const bmMap = {};
        if (bookmarks && bookmarks.length > 0) {
          bookmarks.forEach(b => { bmMap[b.videoUrl] = b; });
        }

        episodeListEl.innerHTML = videoSources.map((src, i) => {
          const bm = bmMap[src.url];
          let badge = '';
          if (bm && bm.progressSeconds > 0) {
            const min = Math.floor(bm.progressSeconds / 60);
            const sec = Math.floor(bm.progressSeconds % 60);
            badge = `<span class="badge bg-secondary ms-1" style="font-size:0.7rem;">已看 ${min}:${String(sec).padStart(2,'0')}</span>`;
          }
          const activeClass = i === currentSourceIndex ? ' active' : '';
          return `<a class="list-group-item list-group-item-action${activeClass}" data-ep="${i}">
            <i class="bi bi-play-circle me-2"></i>${src.epTitle}${badge}
          </a>`;
        }).join('');

        // 重新绑定点击事件
        episodeListEl.querySelectorAll('[data-ep]').forEach(item => {
          item.addEventListener('click', function (e) {
            e.preventDefault();
            const idx = parseInt(this.dataset.ep, 10);
            if (idx !== currentSourceIndex) {
              switchToVideo(idx);
            }
          });
        });
      }

      // ---- 保存进度到后端 ----
      function saveProgress() {
        if (!currentBookmark && dp.video.currentTime < 1) return; // 无记录且时长太短，跳过

        const src = videoSources[currentSourceIndex];
        const body = {
          videoTitle: src.title,
          videoUrl: src.url,
          episodeIndex: src.epIndex,
          episodeTitle: src.epTitle,
          progressSeconds: dp.video.currentTime
        };

        const authHeaders = window.getAuthHeaders ? window.getAuthHeaders() : {};
        const headers = { 'Content-Type': 'application/json', ...authHeaders };

        fetch(API_BASE + '/api/video/save_progress', {
          method: 'POST',
          headers: headers,
          body: JSON.stringify(body)
        })
          .then(res => res.json())
          .then(result => {
            if (result.code === 200) {
              currentBookmark = result.data;
              // 重新渲染列表以更新进度 badge
              fetchBookmarksAndRender();
            }
          })
          .catch(err => console.error('保存进度失败:', err));
      }

      // ---- 从后端拉取追剧列表 ----
      function fetchBookmarksAndRender() {
        const authHeaders = window.getAuthHeaders ? window.getAuthHeaders() : {};
        fetch(API_BASE + '/api/video/bookmarks', {
          headers: authHeaders
        })
          .then(res => res.json())
          .then(result => {
            const bookmarks = (result.code === 200) ? (result.data || []) : [];
            // 找到当前视频对应的 bookmark
            const src = videoSources[currentSourceIndex];
            currentBookmark = bookmarks.find(b => b.videoUrl === src.url) || null;
            renderEpisodeList(bookmarks);
          })
          .catch(err => console.error('获取追剧列表失败:', err));
      }

      // ---- 切换到指定视频 ----
      function switchToVideo(index) {
        // 切换前保存当前进度
        if (dp && playerInited) saveProgress();

        currentSourceIndex = index;
        const src = videoSources[index];

        if (dp) dp.destroy();

        dp = new DPlayer({
          container: container,
          autoplay: false,
          theme: '#0d6efd',
          loop: false,
          lang: 'zh-cn',
          screenshot: false,
          hotkey: true,
          preload: 'auto',
          video: {
            url: src.url,
            type: 'auto'
          }
        });

        // 拉取该视频的历史进度，播放器就绪后跳转
        fetch(API_BASE + '/api/video/bookmarks', {
          headers: window.getAuthHeaders ? window.getAuthHeaders() : {}
        })
          .then(res => res.json())
          .then(result => {
            const bookmarks = (result.code === 200) ? (result.data || []) : [];
            const bm = bookmarks.find(b => b.videoUrl === src.url);
            currentBookmark = bm || null;
            renderEpisodeList(bookmarks);

            // DPlayer 准备好后 seek 到上次位置
            if (bm && bm.progressSeconds > 1) {
              const seekTo = bm.progressSeconds;
              const trySeek = () => {
                if (dp.video.duration > 0) {
                  dp.seek(seekTo);
                } else {
                  setTimeout(trySeek, 500);
                }
              };
              trySeek();
            }
          })
          .catch(err => console.error('获取进度失败:', err));

        // 绑定进度保存事件
        bindProgressEvents();
      }

      // ---- 绑定播放器进度事件 ----
      function bindProgressEvents() {
        // 暂停时保存
        dp.on('pause', function () {
          if (dp.video.currentTime > 0) saveProgress();
        });

        // 播放中每 10 秒保存一次（节流）
        dp.on('timeupdate', function () {
          const now = Date.now();
          if (now - lastSaveTime > 10000 && dp.video.currentTime > 0) {
            lastSaveTime = now;
            saveProgress();
          }
        });
      }

      // ---- 首次初始化 ----
      function ensurePlayerInited() {
        if (!playerInited && !document.getElementById('tab-drama').classList.contains('d-none')) {
          playerInited = true;
          switchToVideo(0);
        }
      }

      // 切换到追剧 tab 时初始化
      document.querySelectorAll('.nav-link[data-tab]').forEach(link => {
        link.addEventListener('click', function () {
          if (this.dataset.tab === 'drama') {
            setTimeout(ensurePlayerInited, 50);
          }
        });
      });

      // 兜底
      setTimeout(ensurePlayerInited, 100);
    })();
  </script>

  <!-- ========== 阅读 - 字号持久化 + 云端书签 ========== -->
  <script>
    (function () {

      const fontSizeLabel  = document.getElementById('font-size-label');

      const bookListEl     = document.getElementById('book-list');

      // ---- 两本测试读物数据 ----
      const books = [
        {

          chapters: [
            {
              title: '第一章 西关大屋的趟栊门',
              text: '<p>广州西关，乃岭南建筑之精粹。走进恩宁路、宝华路一带，可见一幢幢青砖石脚、趟栊门、满洲窗的西关大屋。所谓"趟栊门"，是广府民居最独特的门制——由十余根直径约五厘米的圆木横排而成，既可通风透气，又防盗贼潜入。夏日午后，穿过趟栊门缝隙的微风掠过天井，带着白兰花的幽香，是老广州人记忆中挥之不去的味道。</p><p>大屋平面一般为"三间两廊"布局，正中为厅，两侧为房。厅前天井不单采光通风，更承载着"四水归堂"的风水理念——雨水自四面瓦檐汇入天井，象征财气聚拢。厅内供着祖先牌位，两侧酸枝木椅一字排开，墙面挂着岭南画派的山水条幅，整座建筑处处透出务实又讲究的广府性格。</p>'
            },
            {
              title: '第二章 从泮塘马蹄粉到水晶虾饺',
              text: '<p>如果说西关大屋展现了广府人的居住美学，那么遍布街巷的茶楼食肆，则盛放着广府人最热烈的世俗烟火。广州人"叹茶"一说，实在妙极——一个"叹"字，将那种慢悠悠品味、享受人生的态度勾勒得淋漓尽致。</p><p>虾饺，是检验一家茶楼水准的试金石。上乘虾饺，皮薄如蝉翼、白如凝脂，隐约可见其中粉红色的虾仁馅料。饺皮用料极为讲究，须以澄面和生粉按比例混合，沸水烫熟后趁热搓揉，方可做到晶莹透亮。馅料取新鲜河虾，去壳挑肠，与少许肥猪肉粒、笋丝拌匀——那一口咬下去，弹牙的虾肉爆出鲜甜汁水，便是岭南清晨最动人的问候。</p>'
            },
            {
              title: '第三章 榕树头下的艇仔粥',
              text: '<p>荔枝湾涌旁，百年老榕气根垂地如帘。树下小艇泊岸，船家女人用柴火小炉滚着一锅白粥，这便是广州最草根的街头美食——艇仔粥。鱼片、鱿鱼、浮皮、叉烧、蛋丝、花生、油条碎……一碗粥里仿佛装进了整条珠江的物产。滚粥入碗，食材在高温中迅速断生，撒一把葱花芫荽，滴几滴酱油香油，腾腾热气里是岭南水乡最质朴的人间至味。</p><p>如今荔枝湾涌经城市改造已不复旧时模样，但那些记忆中的味道，依然在老城区的小巷深处倔强地活着。有时深夜路过龙津西路，还能闻到从某扇虚掩的趟栊门后飘出的煲粥香气——那是广州人对生活最温柔的坚持。</p>'
            }
          ]
        },
        {
          key: '8086汇编实战与DOSBox调试',
          chapters: [
            {
              title: '第一章 寄存器与MOV指令',
              text: '<p>8086 CPU 拥有四个通用寄存器：<code>AX</code>（累加器）、<code>BX</code>（基址寄存器）、<code>CX</code>（计数器）、<code>DX</code>（数据寄存器）。每个寄存器为 16 位，又可拆分为高低两个 8 位寄存器，例如 <code>AX</code> 的高 8 位为 <code>AH</code>、低 8 位为 <code>AL</code>。</p><p>最基础的传送指令是 <code>MOV</code>，格式为 <code>MOV 目的, 源</code>。它将源操作数的值复制到目的操作数中，源操作数不变。例如：<code>MOV AX, 1234H</code> 将十六进制数 1234H 加载到 AX 寄存器；<code>MOV BX, AX</code> 再将 AX 的值复制到 BX。需要注意，<code>MOV</code> 不能直接将立即数送入段寄存器（如 <code>MOV DS, 1000H</code> 是非法的），必须经过通用寄存器中转。</p>'
            },
            {
              title: '第二章 DOSBox 环境搭建与 DEBUG 初探',
              text: '<p>在现代操作系统上运行 8086 汇编，需要借助 DOSBox 模拟器。安装 DOSBox 后，将 MASM 或 NASM 汇编工具放入一个工作目录，在 DOSBox 配置文件的 <code>[autoexec]</code> 段中添加 <code>mount C: /path/to/workdir</code> 和 <code>PATH=%PATH%;C:\MASM</code> 即可。</p><p>DOS 自带的 <code>DEBUG.EXE</code> 是最简便的入门工具。启动后输入 <code>R</code> 可查看当前所有寄存器状态；<code>D DS:0</code> 显示数据段前 128 字节的内存内容；<code>A 100</code> 从偏移量 100H 处开始输入汇编指令。逐行输入完毕后空行退出汇编模式，再用 <code>G=100</code> 运行程序，<code>T</code> 单步跟踪。初学者通过这些基本命令便能直观感受寄存器与内存的变化。</p>'
            },
            {
              title: '第三章 中断调用与字符输出',
              text: '<p>在 DOS 环境下，BIOS 和 DOS 提供了丰富的中断服务例程。最常用的 <code>INT 21H</code> 是 DOS 功能调用，其中 <code>AH=02H</code> 可向屏幕输出一个字符（字符存于 <code>DL</code>），<code>AH=09H</code> 输出以 <code>$</code> 结尾的字符串（地址存于 <code>DS:DX</code>）。</p><p>一个完整的 "Hello, World" 程序如下：<br><code>MOV AH, 09H</code><br><code>MOV DX, OFFSET MSG</code><br><code>INT 21H</code><br><code>MOV AH, 4CH</code><br><code>INT 21H</code><br>其中 <code>MSG DB \'Hello, World!$\'</code> 定义字符串数据。4CH 功能调用则用于正常退出程序返回 DOS。调试时可在每步后设断点，观察 <code>DX</code> 指向的内存地址是否确实存放了目标字符串——这是排查段地址错误的常用方法。</p>'
            }
          ]
        }
      ];

      let currentBook    = 0;   // books 数组下标
      let currentChapter = 0;   // 当前书中的章节下标
      let currentFontSize = 16; // 基准 px

      // ---- 字号 LocalStorage 持久化 ----
      function loadFontSize() {
        const saved = localStorage.getItem(FONT_KEY);
        if (saved) {
          const val = parseInt(saved, 10);
          if (val >= 12 && val <= 28) currentFontSize = val;
        }
      }

      function saveFontSize() {
        localStorage.setItem(FONT_KEY, String(currentFontSize));
      }

      function updateFontSize() {
        readerContent.style.fontSize = currentFontSize + 'px';
        fontSizeLabel.textContent = currentFontSize + 'px';
      }

      // ---- 云端书架加载 ----
      let bookshelfMap = {}; // novelTitle → chapterIndex

      function loadBookshelf() {
        const authHeaders = window.getAuthHeaders ? window.getAuthHeaders() : {};
        fetch(API_BASE + '/api/novel/bookshelf', { headers: authHeaders })
          .then(res => res.json())
          .then(result => {
            if (result.code === 200 && result.data) {
              result.data.forEach(item => {
                bookshelfMap[item.novelTitle] = item.chapterIndex;
              });
            }
            // 加载书架后初始化阅读
            initReading();
          })
          .catch(() => { initReading(); });
      }

      function initReading() {
        renderBookList();
        // 尝试定位到云端保存的章节
        const book = books[currentBook];
        const cloudChapter = bookshelfMap[book.key];
        if (cloudChapter !== undefined && cloudChapter >= 0 && cloudChapter < book.chapters.length) {
          currentChapter = cloudChapter;
        } else {
          currentChapter = 0;
        }
        renderChapterList();
        showChapter();
        // 应用缓存的字号
        updateFontSize();
      }

      // ---- 渲染书架书籍列表 ----
      function renderBookList() {
        bookListEl.innerHTML = books.map((book, i) => {
          const activeClass = i === currentBook ? ' active' : '';
          const cloudCh = bookshelfMap[book.key];
          const badge = (cloudCh !== undefined)
            ? '<span class="badge bg-secondary ms-1" style="font-size:0.65rem;">看到第' + (cloudCh + 1) + '章</span>'
            : '';
          return `<a class="list-group-item list-group-item-action${activeClass}" data-book="${i}">
            <i class="bi bi-book me-1"></i>${book.key}${badge}
          </a>`;
        }).join('');

        bookListEl.querySelectorAll('[data-book]').forEach(item => {
          item.addEventListener('click', function (e) {
            e.preventDefault();
            const idx = parseInt(this.dataset.book, 10);
            if (idx !== currentBook) switchBook(idx);
          });
        });
      }

      // ---- 渲染章节目录 ----
      function renderChapterList() {
        const book = books[currentBook];
        chapterListEl.innerHTML = book.chapters.map((ch, i) => {
          const activeClass = i === currentChapter ? ' active' : '';
          return `<a class="list-group-item list-group-item-action${activeClass}" data-ch="${i}">${ch.title}</a>`;
        }).join('');

        chapterListEl.querySelectorAll('[data-ch]').forEach(item => {
          item.addEventListener('click', function (e) {
            e.preventDefault();
            const idx = parseInt(this.dataset.ch, 10);
            if (idx !== currentChapter) {
              switchChapter(idx);
            }
          });
        });
      }

      // ---- 显示当前章节正文 ----
      function showChapter() {
        const book = books[currentBook];
        const ch = book.chapters[currentChapter];
        chapterTitle.textContent = ch.title;
        readerContent.innerHTML = ch.text;
      }

      // ---- 云端保存进度 ----
      function saveProgress() {
        const book = books[currentBook];
        const authHeaders = window.getAuthHeaders ? window.getAuthHeaders() : {};
        const headers = { 'Content-Type': 'application/json', ...authHeaders };

        fetch(API_BASE + '/api/novel/save_progress', {
          method: 'POST',
          headers: headers,
          body: JSON.stringify({
            novelTitle: book.key,
            chapterTitle: book.chapters[currentChapter].title,
            chapterIndex: currentChapter
          })
        })
          .then(res => res.json())
          .then(result => {
            if (result.code === 200) {
              bookshelfMap[book.key] = currentChapter;
              renderBookList(); // 刷新书架 badge
            }
          })
          .catch(() => {});
      }

      // ---- 切换章节 ----
      function switchChapter(index) {
        currentChapter = index;
        showChapter();
        renderChapterList();
        saveProgress(); // 每次切章自动云同步
      }

      // ---- 切换书籍 ----
      function switchBook(index) {
        saveProgress(); // 切书前先保存当前进度
        currentBook = index;
        const cloudCh = bookshelfMap[books[index].key];
        currentChapter = (cloudCh !== undefined) ? cloudCh : 0;
        renderBookList();
        renderChapterList();
        showChapter();
      }

      // ---- 工具栏事件 ----
      document.getElementById('font-minus').addEventListener('click', function () {
        if (currentFontSize > 12) {
          currentFontSize -= 2;
          updateFontSize();
          saveFontSize();
        }
      });

      document.getElementById('font-plus').addEventListener('click', function () {
        if (currentFontSize < 28) {
          currentFontSize += 2;
          updateFontSize();
          saveFontSize();
        }
      });

      btnPrev.addEventListener('click', function () {
        const book = books[currentBook];
        if (currentChapter > 0) {
          switchChapter(currentChapter - 1);
        } else if (currentBook > 0) {
          // 已是第一章，切到上一本书的最后一章
          switchBook(currentBook - 1);
          switchChapter(books[currentBook].chapters.length - 1);
        }
      });

      btnNext.addEventListener('click', function () {
        const book = books[currentBook];
        if (currentChapter < book.chapters.length - 1) {
          switchChapter(currentChapter + 1);
        } else if (currentBook < books.length - 1) {
          // 已是最后一章，切到下一本书的第一章
          switchBook(currentBook + 1);
        }
      });

      // ---- 初始化 ----
      loadFontSize();
      updateFontSize();

      // 切换到阅读 tab 时加载书架
      let novelLoaded = false;
      document.querySelectorAll('.nav-link[data-tab]').forEach(link => {
        link.addEventListener('click', function () {
          if (this.dataset.tab === 'reading' && !novelLoaded) {
            novelLoaded = true;
            setTimeout(loadBookshelf, 100);
          }
        });
      });

      // 兜底
      setTimeout(function () {
        if (!novelLoaded) { novelLoaded = true; loadBookshelf(); }
      }, 500);
    })();
  </script>

  <!-- ========== 听歌 - 原生 Audio + 歌单管理 ========== -->
  <script>
    (function () {
      const API_BASE = 'http://localhost:8080';
      const audio = new Audio(); // HTML5 Audio 单例
      let playlist = [];          // 后端歌单数据
      let currentIndex = -1;     // 当前播放的歌曲在 playlist 中的索引

      const elCover      = document.getElementById('player-cover');
      const elSong       = document.getElementById('player-song');
      const elArtist     = document.getElementById('player-artist');
      const elLyricBox   = document.getElementById('lyric-box');
      const btnPlay      = document.getElementById('btn-play');
      const btnPrev      = document.getElementById('btn-prev');
      const btnNext      = document.getElementById('btn-next');
      const progressBar  = document.querySelector('#player-progress-bar .progress-bar');
      const playlistEl   = document.getElementById('playlist');
      const btnAddSong   = document.getElementById('btn-add-song');
      const inputTitle   = document.getElementById('add-song-title');
      const inputArtist  = document.getElementById('add-song-artist');

      // ---- 从后端加载歌单 ----
      function loadPlaylist() {
        const authHeaders = window.getAuthHeaders ? window.getAuthHeaders() : {};
        fetch(API_BASE + '/api/music/list', { headers: authHeaders })
          .then(res => res.json())
          .then(result => {
            if (result.code === 200) {
              playlist = result.data || [];
              renderPlaylist();
            } else {
              playlistEl.innerHTML = '<div class="text-center text-muted py-3 small">请先登录以加载歌单</div>';
            }
          })
          .catch(() => {
            playlistEl.innerHTML = '<div class="text-center text-muted py-3 small">连接失败，请确认后端服务已启动</div>';
          });
      }

      // ---- 渲染歌单列表 ----
      function renderPlaylist() {
        if (playlist.length === 0) {
          playlistEl.innerHTML = '<div class="text-center text-muted py-3 small">歌单空空，添加一首歌曲吧</div>';
          return;
        }
        playlistEl.innerHTML = playlist.map((song, i) => {
          const activeClass = i === currentIndex ? ' active' : '';
          return `
            <a class="list-group-item list-group-item-action${activeClass}" data-idx="${i}">
              <span class="song-index">${String(i + 1).padStart(2, '0')}</span>
              <span class="flex-grow-1">${escapeHtml(song.songTitle)} - ${escapeHtml(song.artist || '未知')}</span>
              <i class="bi bi-trash text-danger ms-2 delete-song" data-id="${song.id}" title="删除"></i>
            </a>`;
        }).join('');

        // 绑定歌单点击（播放）
        playlistEl.querySelectorAll('[data-idx]').forEach(item => {
          item.addEventListener('click', function (e) {
            if (e.target.closest('.delete-song')) return; // 点击删除图标时不播放
            const idx = parseInt(this.dataset.idx, 10);
            if (idx !== currentIndex) playSong(idx);
          });
        });

        // 绑定删除图标点击
        playlistEl.querySelectorAll('.delete-song').forEach(icon => {
          icon.addEventListener('click', function (e) {
            e.stopPropagation();
            const songId = this.dataset.id;
            deleteSong(songId);
          });
        });
      }

      function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      // ---- 删除歌曲 ----
      function deleteSong(songId) {
        if (!confirm('确定要删除这首歌曲吗？')) return;

        const authHeaders = window.getAuthHeaders ? window.getAuthHeaders() : {};
        fetch(API_BASE + '/api/music/remove/' + songId, {
          method: 'DELETE',
          headers: authHeaders
        })
          .then(res => res.json())
          .then(result => {
            if (result.code === 200) {
              // 如果删除的是当前播放的歌曲，先停止
              const deletedIdx = playlist.findIndex(s => s.id == songId);
              if (deletedIdx === currentIndex) {
                audio.pause();
                updatePlayIcon(false);
              }
              // 从数组中移除
              playlist = playlist.filter(s => s.id != songId);
              if (deletedIdx < currentIndex) currentIndex--;
              if (currentIndex >= playlist.length) currentIndex = playlist.length - 1;
              renderPlaylist();
            } else {
              alert('删除失败: ' + result.message);
            }
          })
          .catch(() => alert('网络错误'));
      }

      // ---- 新增歌曲 ----
      btnAddSong.addEventListener('click', function () {
        const title  = inputTitle.value.trim();
        const artist = inputArtist.value.trim();
        if (!title) { inputTitle.focus(); return; }

        const authHeaders = window.getAuthHeaders ? window.getAuthHeaders() : {};
        const headers = { 'Content-Type': 'application/json', ...authHeaders };

        const songData = {
          songTitle: title,
          artist: artist || '未知',
          coverUrl: 'https://picsum.photos/seed/' + Date.now() + '/400/400',
          sourceUrl: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-' + (1 + playlist.length % 16) + '.mp3',
          sortOrder: playlist.length + 1
        };

        fetch(API_BASE + '/api/music/add', {
          method: 'POST',
          headers: headers,
          body: JSON.stringify(songData)
        })
          .then(res => res.json())
          .then(result => {
            if (result.code === 200) {
              inputTitle.value = '';
              inputArtist.value = '';
              loadPlaylist(); // 重新加载
            } else if (result.code === 401) {
              document.getElementById('btn-login').click();
            } else {
              alert('添加失败: ' + result.message);
            }
          })
          .catch(() => alert('网络错误'));
      });

      // ---- 播放指定歌曲 ----
      function playSong(index) {
        currentIndex = index;
        const song = playlist[index];

        elCover.src = song.coverUrl || 'https://picsum.photos/seed/default/400/400';
        elSong.textContent = song.songTitle;
        elArtist.textContent = song.artist || '未知';
        elLyricBox.innerHTML = '<div class="text-center text-muted py-3 small">正在播放: ' + escapeHtml(song.songTitle) + '</div>';

        if (song.sourceUrl) {
          audio.src = song.sourceUrl;
          audio.load();
          audio.play().then(() => updatePlayIcon(true)).catch(() => updatePlayIcon(false));
        }

        renderPlaylist();
      }

      // ---- 播放/暂停图标 ----
      function updatePlayIcon(playing) {
        const icon = btnPlay.querySelector('i');
        icon.className = playing ? 'bi bi-pause-fill' : 'bi bi-play-fill';
      }

      // ---- 进度条由 audio 事件驱动 ----
      audio.addEventListener('timeupdate', function () {
        if (audio.duration && !isNaN(audio.duration)) {
          const pct = (audio.currentTime / audio.duration) * 100;
          progressBar.style.width = pct + '%';
        }
      });

      audio.addEventListener('ended', function () {
        progressBar.style.width = '0%';
        updatePlayIcon(false);
        // 自动下一首
        if (currentIndex < playlist.length - 1) {
          playSong(currentIndex + 1);
        }
      });

      audio.addEventListener('play',  function () { updatePlayIcon(true);  });
      audio.addEventListener('pause', function () { updatePlayIcon(false); });

      // ---- 控制按钮 ----
      btnPlay.addEventListener('click', function () {
        if (!audio.src && playlist.length > 0) {
          playSong(0);
          return;
        }
        if (audio.paused) {
          audio.play().catch(() => {});
        } else {
          audio.pause();
        }
      });

      btnPrev.addEventListener('click', function () {
        if (playlist.length === 0) return;
        const prev = (currentIndex - 1 + playlist.length) % playlist.length;
        playSong(prev);
      });

      btnNext.addEventListener('click', function () {
        if (playlist.length === 0) return;
        const next = (currentIndex + 1) % playlist.length;
        playSong(next);
      });

      // ---- 进度条点击跳转 ----
      document.getElementById('player-progress-bar').addEventListener('click', function (e) {
        if (!audio.duration || isNaN(audio.duration)) return;
        const rect = this.getBoundingClientRect();
        const pct = (e.clientX - rect.left) / rect.width;
        audio.currentTime = pct * audio.duration;
      });

      // ---- 切换到听歌 tab 时自动加载歌单 ----
      let musicLoaded = false;
      document.querySelectorAll('.nav-link[data-tab]').forEach(link => {
        link.addEventListener('click', function () {
          if (this.dataset.tab === 'music' && !musicLoaded) {
            musicLoaded = true;
            setTimeout(loadPlaylist, 100);
          }
        });
      });

      // 兜底
      setTimeout(function () {
        if (!musicLoaded) { musicLoaded = true; loadPlaylist(); }
      }, 500);
    })();
  </script>

  <!-- ========== 动态 - 发布与渲染逻辑 ========== -->
  <script>
    (function () {
      const API_BASE = 'http://localhost:8080';
      const textarea = document.getElementById('publish-textarea');
      const publishBtn = document.getElementById('publish-btn');
      const timelineList = document.getElementById('timeline-list');

      /** 格式化时间显示 */
      function formatTime(dateStr) {
        const now = new Date();
        const date = new Date(dateStr);
        const diffMs = now - date;
        const diffMin = Math.floor(diffMs / 60000);
        const diffHr  = Math.floor(diffMs / 3600000);
        const diffDay = Math.floor(diffMs / 86400000);

        if (diffMin < 1)  return '刚刚';
        if (diffMin < 60) return diffMin + ' 分钟前';
        if (diffHr  < 24) return diffHr  + ' 小时前';
        if (diffDay < 7)  return diffDay + ' 天前';
        return dateStr.substring(0, 10);
      }

      /** 构建单条动态卡片 HTML */
      function buildCard(post) {
        const nickname = post.userId ? '用户' + post.userId : '匿名';
        const initial  = nickname.charAt(0).toUpperCase();
        const timeStr  = formatTime(post.createdAt);
        const content  = post.content || '';

        // 配图
        let imagesHtml = '';
        if (post.images) {
          try {
            const urls = JSON.parse(post.images);
            if (Array.isArray(urls) && urls.length > 0) {
              const imgTags = urls.map(url =>
                `<div class="col-4"><img src="${url}" alt="配图" class="img-fluid"></div>`
              ).join('');
              imagesHtml = `<div class="feed-images row g-2 mb-3">${imgTags}</div>`;
            }
          } catch (e) { /* images 字段非 JSON 时忽略 */ }
        }

        const likeCount = post.likeCount || 0;
        const commentCount = post.commentCount || 0;

        return `
          <article class="feed-card">
            <div class="d-flex align-items-center gap-3 mb-2">
              <div class="feed-avatar">${initial}</div>
              <div>
                <div class="feed-nickname">${nickname}</div>
                <div class="feed-time">${timeStr}</div>
              </div>
            </div>
            <p class="feed-body">${content}</p>
            ${imagesHtml}
            <div class="feed-actions d-flex gap-3 border-top border-secondary pt-2">
              <button class="btn btn-sm" title="点赞">
                <i class="bi bi-heart me-1"></i>${likeCount}
              </button>
              <button class="btn btn-sm" title="评论">
                <i class="bi bi-chat me-1"></i>${commentCount}
              </button>
            </div>
          </article>`;
      }

      /** 从后端加载并渲染时间线 */
      function loadTimeline() {
        fetch(API_BASE + '/api/timeline/list')
          .then(res => res.json())
          .then(result => {
            const list = result.data || [];
            if (list.length === 0) {
              timelineList.innerHTML = '<div class="timeline-empty"><i class="bi bi-inbox" style="font-size:2rem;"></i><p class="mt-2">暂无动态，快来发布第一条吧！</p></div>';
              return;
            }
            timelineList.innerHTML = list.map(buildCard).join('');
          })
          .catch(err => {
            console.error('加载动态失败:', err);
            timelineList.innerHTML = '<div class="timeline-empty">加载失败，请确认后端服务已启动</div>';
          });
      }

      /** 发布新动态 */
      publishBtn.addEventListener('click', function () {
        const text = textarea.value.trim();
        if (!text) {
          textarea.focus();
          return;
        }

        const postData = {
          userId: 1,   // 暂用固定用户ID
          content: text
          // images 字段暂不提交
        };

        // 合并鉴权请求头
        const authHeaders = window.getAuthHeaders ? window.getAuthHeaders() : {};
        const headers = { 'Content-Type': 'application/json', ...authHeaders };

        fetch(API_BASE + '/api/timeline/add', {
          method: 'POST',
          headers: headers,
          body: JSON.stringify(postData)
        })
          .then(res => res.json())
          .then(result => {
            if (result.code === 401) {
              // 未授权 → 弹出登录框
              document.getElementById('btn-login').click();
              return;
            }
            if (result.code === 200) {
              textarea.value = '';
              loadTimeline(); // 刷新列表
            } else {
              alert('发布失败: ' + result.message);
            }
          })
          .catch(err => {
            console.error('发布失败:', err);
            alert('网络错误，请确认后端服务已启动');
          });
      });

      // 页面加载时拉取动态列表
      loadTimeline();
    })();
  </script>

  <!-- ========== 登录鉴权逻辑 ========== -->
  <script>
    (function () {
      const API_BASE = 'http://localhost:8080';
      const TOKEN_KEY = 'windsing_token';

      const btnLogin       = document.getElementById('btn-login');
      const loginModal     = document.getElementById('loginModal');
      const bsModal        = new bootstrap.Modal(loginModal);
      const btnSubmit      = document.getElementById('btn-login-submit');
      const inputUsername  = document.getElementById('login-username');
      const inputPassword  = document.getElementById('login-password');
      const loginError     = document.getElementById('login-error');

      /** 获取存储的 Token */
      window.getToken = function () {
        return localStorage.getItem(TOKEN_KEY);
      };

      /** 获取带 Auth 头的配置对象 */
      window.getAuthHeaders = function () {
        const token = window.getToken();
        if (!token) return {};
        return { 'Authorization': 'Bearer ' + token };
      };

      /** 更新登录按钮状态 */
      function updateLoginBtn() {
        const token = window.getToken();
        if (token) {
          btnLogin.classList.add('logged-in');
          btnLogin.title = '已登录，点击登出';
        } else {
          btnLogin.classList.remove('logged-in');
          btnLogin.title = '登录';
        }
      }

      /** 登录按钮点击 */
      btnLogin.addEventListener('click', function () {
        if (window.getToken()) {
          // 已登录 → 登出
          if (confirm('确定要退出登录吗？')) {
            localStorage.removeItem(TOKEN_KEY);
            updateLoginBtn();
          }
          return;
        }
        // 未登录 → 弹出登录框
        inputUsername.value = '';
        inputPassword.value = '';
        loginError.classList.add('d-none');
        bsModal.show();
      });

      /** 提交登录 */
      btnSubmit.addEventListener('click', function () {
        const username = inputUsername.value.trim();
        const password = inputPassword.value;

        if (!username || !password) {
          loginError.textContent = '账号和密码不能为空';
          loginError.classList.remove('d-none');
          return;
        }

        fetch(API_BASE + '/api/user/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        })
          .then(res => res.json())
          .then(result => {
            if (result.code === 200 && result.data && result.data.token) {
              localStorage.setItem(TOKEN_KEY, result.data.token);
              updateLoginBtn();
              bsModal.hide();
            } else {
              loginError.textContent = result.message || '登录失败';
              loginError.classList.remove('d-none');
            }
          })
          .catch(() => {
            loginError.textContent = '网络错误，请确认后端服务已启动';
            loginError.classList.remove('d-none');
          });
      });

      // 回车键提交登录
      loginModal.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') btnSubmit.click();
      });

      // 初始状态
      updateLoginBtn();
    })();
  </script>

  <!-- ========== SPA Tab 切换逻辑 ========== -->
  <script>
    (function () {
      // 获取所有导航链接和内容区块
      const navLinks = document.querySelectorAll('.nav-link[data-tab]');
      const sections = {
        feeds:  document.getElementById('tab-feeds'),
        drama:  document.getElementById('tab-drama'),
        music:  document.getElementById('tab-music'),
        reading: document.getElementById('tab-reading')
      };

      /**
       * 切换到指定 tab
       * @param {string} tabKey - feeds | drama | music | reading
       */
      function switchTab(tabKey) {
        // 1. 更新导航高亮
        navLinks.forEach(link => {
          const isTarget = link.dataset.tab === tabKey;
          link.classList.toggle('active', isTarget);
        });

        // 2. 切换内容区块显示/隐藏
        Object.keys(sections).forEach(key => {
          sections[key].classList.toggle('d-none', key !== tabKey);
        });
      }

      // 为每个导航链接绑定点击事件
      navLinks.forEach(link => {
        link.addEventListener('click', function (e) {
          e.preventDefault();
          switchTab(this.dataset.tab);
        });
      });

      // 页面加载时默认显示『动态』
      switchTab('feeds');
    })();
  </script>
