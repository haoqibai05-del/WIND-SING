<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>风歌 WIND-SING</title>

  <!-- Bootstrap 5 CSS（暗黑模式） -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    :root {
      --bg-dark: #121212;
      --text-soft: #ccc;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-soft);
      /* 为固定导航栏预留顶部间距 */
      padding-top: 70px;
    }

    /* 导航栏品牌样式 */
    .navbar-brand {
      font-weight: 700;
      letter-spacing: 1px;
    }

    /* 导航链接默认样式 */
    .nav-link {
      cursor: pointer;
      transition: color 0.2s, background-color 0.2s;
    }

    /* 当前激活的导航项高亮 */
    .nav-link.active {
      color: #fff !important;
      font-weight: 600;
    }

    /* 内容模块卡片 */
    .content-card {
      background-color: #1e1e1e;
      border-radius: 8px;
      padding: 2rem;
      margin-bottom: 1.5rem;
    }

    .content-card h2 {
      color: #fff;
      margin-bottom: 1rem;
    }

    .content-card p {
      color: #aaa;
      line-height: 1.8;
    }
  </style>
</head>
<body>

  <!-- ========== 顶部固定导航栏 ========== -->
  <nav class="navbar navbar-expand-lg fixed-top bg-dark border-bottom border-secondary">
    <div class="container">
      <!-- 品牌 Logo -->
      <a class="navbar-brand" href="#">
        <i class="bi bi-wind me-2"></i>风歌 WIND-SING
      </a>

      <!-- 移动端汉堡菜单按钮 -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
              aria-controls="navbarNav" aria-expanded="false" aria-label="切换导航">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- 导航菜单项 -->
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link active" data-tab="feeds">
              <i class="bi bi-rss me-1"></i>动态
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-tab="drama">
              <i class="bi bi-tv me-1"></i>追剧
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-tab="music">
              <i class="bi bi-music-note-beamed me-1"></i>听歌
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-tab="reading">
              <i class="bi bi-book me-1"></i>阅读
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- ========== 主内容区 ========== -->
  <main class="container">

    <!-- 动态 -->
    <section id="tab-feeds" class="content-card">
      <h2><i class="bi bi-rss me-2"></i>动态</h2>
      <p>这里将展示最新的个人动态、生活记录和杂文随想。</p>
    </section>

    <!-- 追剧 -->
    <section id="tab-drama" class="content-card d-none">
      <h2><i class="bi bi-tv me-2"></i>追剧</h2>
      <p>这里将展示正在追的剧集、观影记录和影评推荐。</p>
    </section>

    <!-- 听歌 -->
    <section id="tab-music" class="content-card d-none">
      <h2><i class="bi bi-music-note-beamed me-2"></i>听歌</h2>
      <p>这里将展示最近常听的音乐、歌单和音乐分享。</p>
    </section>

    <!-- 阅读 -->
    <section id="tab-reading" class="content-card d-none">
      <h2><i class="bi bi-book me-2"></i>阅读</h2>
      <p>这里将展示最近阅读的书籍、读书笔记和书评。</p>
    </section>

  </main>

  <!-- Bootstrap 5 JS（导航栏折叠等功能依赖） -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- ========== SPA Tab 切换逻辑 ========== -->
  <script>
    (function () {
      // 获取所有导航链接和内容区块
      const navLinks = document.querySelectorAll('.nav-link[data-tab]');
      const sections = {
        feeds:  document.getElementById('tab-feeds'),
        drama:  document.getElementById('tab-drama'),
        music:  document.getElementById('tab-music'),
        reading: document.getElementById('tab-reading')
      };

      /**
       * 切换到指定 tab
       * @param {string} tabKey - feeds | drama | music | reading
       */
      function switchTab(tabKey) {
        // 1. 更新导航高亮
        navLinks.forEach(link => {
          const isTarget = link.dataset.tab === tabKey;
          link.classList.toggle('active', isTarget);
        });

        // 2. 切换内容区块显示/隐藏
        Object.keys(sections).forEach(key => {
          sections[key].classList.toggle('d-none', key !== tabKey);
        });
      }

      // 为每个导航链接绑定点击事件
      navLinks.forEach(link => {
        link.addEventListener('click', function (e) {
          e.preventDefault();
          switchTab(this.dataset.tab);
        });
      });

      // 页面加载时默认显示『动态』
      switchTab('feeds');
    })();
  </script>

</body>
</html>
